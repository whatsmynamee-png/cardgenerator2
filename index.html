<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epik Kart Oluşturucu - Özel İkonlu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Marcellus+SC&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8c2c;
            --bg-dark: #121212;
            --text-glow: 0 0 5px #000, 0 0 10px #000, 0 0 15px #000;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Marcellus SC', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            min-height: 100vh;
        }

        /* Menü Stilleri */
        .controls {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--gold-dark);
            width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .controls h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: var(--gold);
            margin-top: 0;
            border-bottom: 1px solid var(--gold-dark);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--gold);
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid var(--gold-dark);
            color: #fff;
            border-radius: 5px;
            font-family: 'Marcellus SC', serif;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        /* Sanatsal Dış Çerçeve (Altın/Bronz Metalik Efekt) */
        .card-border-outer {
            padding: 12px;
            background: linear-gradient(135deg, #b89947 0%, #4a3b12 25%, #f3e5ab 50%, #4a3b12 75%, #b89947 100%);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 25px rgba(212, 175, 55, 0.3);
            position: relative;
        }

        /* Çerçeve içi ince rünik/oyma süsleme hissi */
        .card-border-outer::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 2px solid rgba(0, 0, 0, 0.6);
            border-radius: 18px;
            pointer-events: none;
        }

        /* Kart Stilleri */
        .card-container {
            position: relative;
            width: 400px;
            height: 560px;
            border-radius: 14px;
            background-color: #000;
            background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=800&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            /* Kartın en iç kısmına ekstra bir karanlık gölge */
            box-shadow: inset 0 0 0 2px rgba(212, 175, 55, 0.4), inset 0 0 40px rgba(0,0,0,0.9);
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        /* Kart İsmi */
        /* Karakter İsmi ve Çerçevesi */
    .card-name {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%; /* Çerçevenin genişliği */
    padding: 5px 10px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: #fff;
    text-shadow: var(--text-glow);
    z-index: 10;

    /* Sanatsal Çerçeve Efekti */
    background: linear-gradient(90deg, transparent, rgba(184, 153, 71, 0.3), rgba(184, 153, 71, 0.6), rgba(184, 153, 71, 0.3), transparent);
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

        /* Özel İkonlu İstatistik Rozetleri */
        .stat-badge {
            position: absolute;
            width: 80px;  /* İkonlar detaylı olduğu için biraz büyüttüm */
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            /* Değerin ikon üzerinde okunabilmesi için çok güçlü bir siyah gölge */
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000, 
                -2px 2px 0 #000, 2px 2px 0 #000, 
                0 0 10px #000, 0 0 20px #000;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.9);
            z-index: 10;
            border: 2px solid rgba(0,0,0,0.5); /* Çerçeveler ikonun kendisine ait olduğu için bunu sadece derinlik için koyduk */
        }

        /* Senin Yüklediğin İkonlar */
        .stat-hp {
            top: 10px;
            left: 10px;
            background-image: url('hpicon.png');
        }

        .stat-mana {
            top: 10px;
            right: 10px;
            background-image: url('manaicon.png');
        }

        .stat-atk {
            bottom: 10px;
            left: 10px;
            background-image: url('saldırıicon.png');
        }

        .stat-def {
            bottom: 10px;
            right: 10px;
            background-image: url('savunmaicon.png');
        }

        /* Sınıf Logosu */
       .class-logo {
    position: absolute;
    bottom: 145px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px; /* Biraz büyüterek daha dolgun gösteriyoruz */
    height: 70px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    background-color: rgba(0,0,0,0.5);
    
    /* PNG boşluklarını bitiren ayar */
    background-size: 140% !important; /* %100'den büyük yaparak şeffaf kenarları dışarıda bırakıyoruz */
    background-position: center !important;
    background-repeat: no-repeat !important;
    
    box-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.4);
    z-index: 10;
}

        /* Pasif Yetenek Kutusu */
        .passive-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            padding: 20px 10px 10px 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            z-index: 9;
        }

        .passive-box::before {
            content: '';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85px;
            height: 45px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 15px 0 0 rgba(10, 10, 10, 0.85);
            z-index: -1;
        }

        .passive-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #e5e5e5;
            text-shadow: 1px 1px 3px #000;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Kart Atölyesi</h2>
        
        <div class="form-group">
            <label for="imgUpload">Ana Görsel (JPG/PNG):</label>
            <input type="file" id="imgUpload" accept="image/*">
        </div>

        <div class="form-group">
            <label for="nameInput">Karakter İsmi:</label>
            <input type="text" id="nameInput" value="Yüce Muhafız">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label for="hpInput">HP (Sağlık):</label>
                <input type="number" id="hpInput" value="12">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="manaInput">Mana (Bedel):</label>
                <input type="number" id="manaInput" value="5">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label for="atkInput">Saldırı (ATK):</label>
                <input type="number" id="atkInput" value="8">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="defInput">Savunma (DEF):</label>
                <input type="number" id="defInput" value="7">
            </div>
        </div>

        <div class="form-group">
            <label for="logoUpload">Karakter Sınıfı Logosu:</label>
            <input type="file" id="logoUpload" accept="image/*">
        </div>

        <div class="form-group">
            <label for="passiveInput">Pasif Yetenek Açıklaması:</label>
            <textarea id="passiveInput">Düşman birimleri bu karaktere saldırdığında dondurucu bir aura ile yavaşlarlar.</textarea>
        </div>
    </div>

    <div class="card-border-outer">
        <div class="card-container" id="cardContainer">
            <div class="card-overlay"></div>
            
            <div class="card-name" id="cardName">Yüce Muhafız</div>
            
            <div class="stat-badge stat-hp" id="cardHp">12</div>
            <div class="stat-badge stat-mana" id="cardMana">5</div>
            <div class="stat-badge stat-atk" id="cardAtk">8</div>
            <div class="stat-badge stat-def" id="cardDef">7</div>

            <div class="class-logo" id="cardLogo"></div>
            
            <div class="passive-box">
                <div class="passive-text" id="cardPassive">Düşman birimleri bu karaktere saldırdığında dondurucu bir aura ile yavaşlarlar.</div>
            </div>
        </div>
    </div>

    <script>
        const imgUpload = document.getElementById('imgUpload');
        const logoUpload = document.getElementById('logoUpload');
        const cardContainer = document.getElementById('cardContainer');
        const cardLogo = document.getElementById('cardLogo');

        const inputs = {
            name: { input: document.getElementById('nameInput'), display: document.getElementById('cardName') },
            hp: { input: document.getElementById('hpInput'), display: document.getElementById('cardHp') },
            mana: { input: document.getElementById('manaInput'), display: document.getElementById('cardMana') },
            atk: { input: document.getElementById('atkInput'), display: document.getElementById('cardAtk') },
            def: { input: document.getElementById('defInput'), display: document.getElementById('cardDef') },
            passive: { input: document.getElementById('passiveInput'), display: document.getElementById('cardPassive') }
        };

        for (const key in inputs) {
            inputs[key].input.addEventListener('input', function(e) {
                inputs[key].display.innerText = e.target.value;
            });
        }

        imgUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardContainer.style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        logoUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardLogo.style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
