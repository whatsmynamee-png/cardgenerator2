<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epik Kart Oluşturucu - Final Versiyon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Marcellus+SC&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8c2c;
            --bg-dark: #121212;
            --text-glow: 0 0 5px #000, 0 0 10px #000;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Marcellus SC', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            min-height: 100vh;
        }

        /* --- MENÜ STİLLERİ --- */
        .controls {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--gold-dark);
            width: 320px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-height: 90vh;
            overflow-y: auto;
        }

        .controls h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: var(--gold);
            margin-top: 0;
            border-bottom: 1px solid var(--gold-dark);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px; background: #2a2a2a; border: 1px solid var(--gold-dark);
            color: #fff; border-radius: 5px; font-family: 'Marcellus SC', serif; box-sizing: border-box;
        }
        .form-group textarea { resize: vertical; height: 60px; }

        /* --- KART DIŞ ÇERÇEVE --- */
        .card-border-outer {
            padding: 12px;
            background: linear-gradient(135deg, #b89947 0%, #4a3b12 25%, #f3e5ab 50%, #4a3b12 75%, #b89947 100%);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
        }

        /* --- KART GÖVDESİ --- */
        .card-container {
            position: relative;
            width: 400px;
            height: 560px;
            border-radius: 14px;
            background-color: #000;
            background-image: url('https://via.placeholder.com/400x560'); /* Varsayılan */
            background-size: cover;
            background-position: center;
            overflow: visible; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        /* --- 1. DİNAMİK İSİM ÇERÇEVESİ --- */
        .card-name {
            position: relative;
            margin-top: 35px;
            width: 85%;
            padding: 10px 15px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 5px #000;
            z-index: 10;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.8), rgba(184, 153, 71, 0.4), rgba(0,0,0,0.8), transparent);
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
        }

        /* --- STAT İKONLARI --- */
        .stat-badge {
            position: absolute;
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900; color: #fff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            background-size: cover; z-index: 20;
        }
        .stat-hp { top: 5px; left: 5px; background-image: url('hpicon.png'); }
        .stat-mana { top: 5px; right: 5px; background-image: url('manaicon.png'); }
        .stat-atk { bottom: 5px; left: 5px; background-image: url('saldırıicon.png'); }
        .stat-def { bottom: 15px; right: 5px; background-image: url('savunmaicon.png'); }

        /* --- 3. DİNAMİK ALT GRUP (Logo ve Kutular) --- */
        .bottom-content {
            position: absolute;
            bottom: 25px;
            left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 12;
        }

        .class-logo {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            background-color: #000;
            background-size: 145% !important; /* PNG boşluk çözümü */
            background-position: center !important;
            background-repeat: no-repeat !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .passive-box {
            width: 80%;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        .passive-text { font-size: 0.9rem; line-height: 1.3; color: #ddd; }

        /* --- 2. KÖKEN KUTUSU --- */
        .origin-box {
            background: linear-gradient(to bottom, #d4af37, #aa8c2c);
            color: #000;
            padding: 2px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: -3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Kart Atölyesi</h2>
        <div class="form-group"><label>Ana Görsel:</label><input type="file" id="imgUpload"></div>
        <div class="form-group"><label>Karakter İsmi:</label><input type="text" id="nameInput" value="YÜCE MUHAFIZ"></div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group"><label>HP:</label><input type="number" id="hpInput" value="12"></div>
            <div class="form-group"><label>Mana:</label><input type="number" id="manaInput" value="5"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group"><label>ATK:</label><input type="number" id="atkInput" value="8"></div>
            <div class="form-group"><label>DEF:</label><input type="number" id="defInput" value="7"></div>
        </div>
        <div class="form-group"><label>Sınıf Logosu:</label><input type="file" id="logoUpload"></div>
        <div class="form-group"><label>Pasif Yetenek:</label><textarea id="passiveInput">Bu birim her tur başında 2 HP yeniler.</textarea></div>
        <div class="form-group"><label>Karakter Kökeni:</label><input type="text" id="originInput" value="GÖK TÜRKLER"></div>
    </div>

    <div class="card-border-outer">
        <div class="card-container" id="cardContainer">
            <div class="card-overlay"></div>
            
            <div class="card-name" id="cardName">YÜCE MUHAFIZ</div>
            
            <div class="stat-badge stat-hp" id="cardHp">12</div>
            <div class="stat-badge stat-mana" id="cardMana">5</div>
            <div class="stat-badge stat-atk" id="cardAtk">8</div>
            <div class="stat-badge stat-def" id="cardDef">7</div>

            <div class="bottom-content">
                <div class="class-logo" id="cardLogo"></div>
                <div class="passive-box">
                    <div class="passive-text" id="cardPassive">Bu birim her tur başında 2 HP yeniler.</div>
                </div>
                <div class="origin-box" id="cardOrigin">GÖK TÜRKLER</div>
            </div>
        </div>
    </div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cardLogo = document.getElementById('cardLogo');

        const inputs = {
            name: { input: document.getElementById('nameInput'), display: document.getElementById('cardName') },
            hp: { input: document.getElementById('hpInput'), display: document.getElementById('cardHp') },
            mana: { input: document.getElementById('manaInput'), display: document.getElementById('cardMana') },
            atk: { input: document.getElementById('atkInput'), display: document.getElementById('cardAtk') },
            def: { input: document.getElementById('defInput'), display: document.getElementById('cardDef') },
            passive: { input: document.getElementById('passiveInput'), display: document.getElementById('cardPassive') },
            origin: { input: document.getElementById('originInput'), display: document.getElementById('cardOrigin') }
        };

        // Input dinleyicileri
        Object.keys(inputs).forEach(key => {
            inputs[key].input.addEventListener('input', (e) => {
                inputs[key].display.innerText = e.target.value.toUpperCase();
            });
        });

        // Dosya Yükleme Fonksiyonları
        document.getElementById('imgUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => cardContainer.style.backgroundImage = `url('${ev.target.result}')`;
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('logoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    cardLogo.style.backgroundImage = `url('${ev.target.result}')`;
                    cardLogo.style.backgroundSize = "145%"; // PNG boşluğu için zorlama
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
